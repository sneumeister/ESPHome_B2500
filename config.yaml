            ssid: !secret wifi_ssid
            password: !secret wifi_password
  - platform: template
    id: b2500_button_set_mqtt_1
    name: "B2500 - 1 - B2500: Set MQTT to george"
    device_id: b2500_device_1
    command_topic: "b2500/1/mqtt/set"
    disabled_by_default: True
    on_press:
      then:
        - b2500.set_mqtt:
            id: b2500_1
            host: !secret mqtt_broker
            port: !secret mqtt_port
            username: !secret mqtt_username
            password: !secret mqtt_password
  - platform: template
    id: b2500_button_reset_mqtt_1
    name: "B2500 - 1 - B2500: Reset MQTT"
    device_id: b2500_device_1
    command_topic: "b2500/1/mqtt/reset"
    disabled_by_default: True
    on_press:
      then:
        - b2500.reset_mqtt:
            id: b2500_1

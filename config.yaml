esphome:
  name: "b2500"
  friendly_name: "B2500"
  devices:
    - id: b2500_device_1
      name: "B2500"
  on_boot:
    priority: -100
    then:
      - lambda: id(b2500_device_generation_1).publish_state("2");
      - lambda: id(b2500_device_name_1).publish_state("B2500");
      - wait_until:
          condition:
            mqtt.connected
      - lambda: |-
          const char *power_config =
            "{\"name\":\"B2500 Battery Power (netto)\","
            "\"uniq_id\":\"b2500_batt_power_netto\","
            "\"stat_t\":\"b2500/1/battery/power_netto\","
            "\"dev_cla\":\"power\","
            "\"stat_cla\":\"measurement\","
            "\"unit_of_meas\":\"W\","
            "\"dev\":{\"ids\":[\"b2500_1\"],\"name\":\"B2500\"}}";
          id(mqtt_client).publish("homeassistant/sensor/b2500_batt_power_netto/config", std::string(power_config), 1, true);
          const char *current_config =
            "{\"name\":\"B2500 Battery Current (netto)\","
            "\"uniq_id\":\"b2500_batt_current_netto\","
            "\"stat_t\":\"b2500/1/battery/current_netto\","
            "\"dev_cla\":\"current\","
            "\"stat_cla\":\"measurement\","
            "\"unit_of_meas\":\"A\","
            "\"dev\":{\"ids\":[\"b2500_1\"],\"name\":\"B2500\"}}";
          id(mqtt_client).publish("homeassistant/sensor/b2500_batt_current_netto/config", std::string(current_config), 1, true);

globals:
  - id: g_dpl_limit
    type: int
    restore_value: no
    initial_value: '0'

esp32:
  board: "esp32dev"
  variant: "esp32"
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
      COMPILER_OPTIMIZATION_SIZE: y

# Enable logging
logger:
  level: INFO
ota:
  - platform: esphome
    password: !secret ota_password
external_components:
  - source:
      type: git
      url: https://github.com/tomquist/esphome-b2500
      ref: "main"
    refresh: 0s
    components: [b2500]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  fast_connect: True
  on_connect:
    - logger.log:
        level: INFO
        format: "Connected to WiFi. Starting BLE scan."
  on_disconnect:
    - logger.log:
        level: INFO
        format: "Disconnected from WiFi. Stopping BLE scan."
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "ESPHome-b2500"
web_server:
  port: 80
  ota: false
  version: 3
captive_portal:
mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: True
  reboot_timeout: 0s
  topic_prefix: "b2500"
  log_topic: "b2500/debug"
  on_connect:
    - logger.log:
        level: INFO
        format: "MQTT connected"
  on_disconnect:
    - logger.log:
        level: INFO
        format: "MQTT disconnected"
  on_message:
    - topic: "solar/114184878827/status/limit_absolute"
      then:
        - lambda: |-
            int limit = (int) atof(x.c_str());
            if (limit < 0) limit = 0;
            if (limit > 800) limit = 800;
            id(g_dpl_limit) = limit;
            ESP_LOGI("dpl", "OpenDTU DPL limit: %d W", limit);
        - if:
            condition:
              lambda: 'return id(g_dpl_limit) < 50;'
            then:
              - b2500.set_timer:
                  id: b2500_1
                  generation: 2
                  timer: 0
                  enabled: false
            else:
              - b2500.set_timer:
                  id: b2500_1
                  generation: 2
                  timer: 0
                  enabled: true
                  output_power: !lambda 'return id(g_dpl_limit);'

b2500:
  - id: b2500_1
    generation: 2
    update_interval: 5s
    ble_client_id: b2500_ble_client_1

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"

esp32_ble:
  id: ble
  max_connections: 1

esp32_ble_tracker:

ble_client:
  - mac_address: !secret b2500_mac
    id: b2500_ble_client_1
    on_connect:
      then:
        - logger.log:
            level: INFO
            format: "Connected to BLE device 1 (B2500)"
        - binary_sensor.template.publish:
            id: b2500_device_ble_ok_1
            state: ON
        - delay: 1s
        - b2500.set_datetime:
            id: b2500_1
            datetime: !lambda 'return id(sntp_time).now();'
        - delay: 1s
        - switch.turn_off: b2500_smartmeter_enabled_1
        - delay: 1s
        - select.set:
            id: b2500_charge_mode_1
            option: "LoadFirst"
        - delay: 1s
        - b2500.set_timer:
            id: b2500_1
            generation: 2
            timer: 0
            enabled: !lambda 'return id(g_dpl_limit) >= 50;'
            output_power: !lambda 'return id(g_dpl_limit) >= 50 ? id(g_dpl_limit) : 50;'
            start_hour: 0
            start_minute: 0
            end_hour: 23
            end_minute: 59

    on_disconnect:
      then:
        - logger.log:
            level: INFO
            format: "Disconnected from BLE device 1 (B2500)"
        - binary_sensor.template.publish:
            id: b2500_device_ble_ok_1
            state: OFF

button:
  - platform: restart
    id: controller_restart
    name: "Restart Controller"
    command_topic: "b2500/restart/set"
  - platform: b2500
